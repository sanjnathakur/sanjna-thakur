<svg width="180" height="45" viewBox="0 0 180 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant blue to purple gradient for the modern AI design system -->
    <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>

  <!-- Premium Compass / Path Weaving Icon -->
  <g transform="translate(2, 2)">
    <circle cx="20" cy="20" r="18" fill="url(#logo-grad)" opacity="0.1" />
    <path d="M12 20C12 15.5817 15.5817 12 20 12C24.4183 12 28 15.5817 28 20" stroke="url(#logo-grad)" stroke-width="3" stroke-linecap="round" />
    <path d="M28 20C28 24.4183 24.4183 28 20 28C15.5817 28 12 24.4183 12 20" stroke="#2563eb" stroke-width="2" stroke-dasharray="3 3" />
    <!-- Paper Airplane representing adventure and flight -->
    <path d="M17 17L24 15L22 22L20 19L17 17Z" fill="url(#logo-grad)" />
  </g>

  <!-- Tailored Brand Typography -->
  <text x="48" y="28" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="22" fill="#0f172a" letter-spacing="1">WEAVE</text>
  
  <!-- Styled Pill Badge indicating the AI Core -->
  <rect x="134" y="12" width="26" height="17" rx="5" fill="#2563eb" />
  <text x="139" y="24" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="10" fill="#ffffff">AI</text>
</svg>